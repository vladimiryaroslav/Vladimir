<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/home/vlad - Discord Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(26, 26, 26, 0.8);
            --bg-card-hover: rgba(34, 34, 34, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --success: #57f287;
            --warning: #fee75c;
            --danger: #ed4245;
            --offline: #747f8d;
            --border: rgba(42, 42, 42, 0.8);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Enhanced Background with Multiple Layers */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            overflow: hidden;
        }

        .bg-gif {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: zoomInOut 20s ease-in-out infinite;
            filter: brightness(0.3) contrast(1.2);
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(10, 10, 10, 0.8) 0%,
                rgba(10, 10, 10, 0.6) 50%,
                rgba(10, 10, 10, 0.8) 100%
            );
            z-index: -2;
        }

        /* Animated Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        @keyframes zoomInOut {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        /* Enhanced Title Styling */
        .title {
            position: relative;
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .title-text {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #ffffff 0%, #5865f2 50%, #57f287 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
        }

        .title-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #5865f2 50%, #57f287 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(20px);
            opacity: 0.5;
            animation: titleGlow 3s ease-in-out infinite reverse;
        }

        @keyframes titleGlow {
            0%, 100% { 
                filter: blur(20px) brightness(1);
                opacity: 0.5;
            }
            50% { 
                filter: blur(15px) brightness(1.2);
                opacity: 0.7;
            }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(88, 101, 242, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .profile-card:hover::before {
            left: 100%;
        }

        .profile-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }

        .avatar-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 4px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .avatar.online { border-color: var(--success); }
        .avatar.idle { border-color: var(--warning); }
        .avatar.dnd { border-color: var(--danger); }
        .avatar.offline { border-color: var(--offline); }

        .status-indicator {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid var(--bg-card);
            background: var(--offline);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        .status-indicator.online { background: var(--success); }
        .status-indicator.idle { background: var(--warning); }
        .status-indicator.dnd { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .user-info h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .user-status {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .custom-status {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(88, 101, 242, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .stat-item:hover::before {
            left: 100%;
        }

        .stat-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background: rgba(17, 17, 17, 0.9);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .activity-section {
            margin-top: 2rem;
        }

        .activity-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .activity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(88, 101, 242, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .activity-card:hover::before {
            left: 100%;
        }

        .activity-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }

        .activity-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .activity-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 16px rgba(88, 101, 242, 0.3);
            transition: all 0.3s ease;
        }

        .activity-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }

        .activity-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .spotify-content {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .album-art {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .album-art:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            font-size: 1rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .track-artist {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .progress-container {
            margin-top: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 3px;
            transition: width 0.5s ease-out;
            box-shadow: 0 0 8px rgba(88, 101, 242, 0.5);
            animation: progressPulse 2s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .spotify-link {
            margin-top: 1rem;
        }

        .spotify-link a {
            color: var(--success);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            padding: 0.5rem 1rem;
            border: 1px solid rgba(87, 242, 135, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .spotify-link a:hover {
            color: var(--text-primary);
            background: rgba(87, 242, 135, 0.1);
            border-color: var(--success);
            transform: translateY(-2px);
        }

        .no-activity {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 2rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Enhanced Music Control */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .music-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(26, 26, 26, 0.8);
            border: 2px solid var(--accent);
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .music-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(88, 101, 242, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .music-btn:hover::before {
            left: 100%;
        }

        .music-btn:hover {
            background: rgba(88, 101, 242, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
        }

        .music-btn.playing {
            background: rgba(87, 242, 135, 0.2);
            border-color: var(--success);
            animation: pulse 2s infinite;
        }

        /* Weather Widget */
        .weather-widget {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            z-index: 1000;
            min-width: 150px;
            transition: all 0.3s ease;
        }

        .weather-widget:hover {
            border-color: var(--accent);
            background: rgba(26, 26, 26, 0.9);
            transform: translateY(-2px);
        }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .weather-temp {
            font-weight: 600;
            color: var(--accent);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .title {
                font-size: 2.5rem;
            }
            
            .profile-section {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .spotify-content {
                flex-direction: column;
                text-align: center;
            }

            .weather-widget {
                position: static;
                margin-bottom: 1rem;
                max-width: 200px;
                margin-left: auto;
                margin-right: auto;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .music-control {
                top: 10px;
                right: 10px;
            }
            
            .music-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="One - Metallica.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <!-- Enhanced Background -->
    <div class="background-container">
        <img src="https://i.pinimg.com/originals/d2/ab/0f/d2ab0fe55a5ada215f7ef187c7a8677f.gif" alt="Chicago Skyline" class="bg-gif">
        <div class="bg-overlay"></div>
    </div>
    
    <!-- Animated Particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Music Control Button -->
    <div class="music-control">
        <button id="musicToggle" class="music-btn">
            <span class="music-icon">🎵</span>
        </button>
    </div>
    
    <div class="container">
        <div class="header fade-in">
            <h1 class="title">
                <span class="title-text">/home/vlad</span>
            </h1>
            <p class="subtitle">Discord Profile & Activity</p>
        </div>

        <div class="profile-section fade-in">
            <div class="profile-card">
                <div class="avatar-container">
                    <div id="avatar" class="avatar">
                        <div id="statusIndicator" class="status-indicator"></div>
                    </div>
                </div>
                <div class="user-info">
                    <h2 id="username">Loading...</h2>
                    <div id="userStatus" class="user-status">Connecting...</div>
                    <div id="customStatus" class="custom-status"></div>
                </div>
            </div>

            <div class="profile-card">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div id="platformDesktop" class="stat-value">-</div>
                        <div class="stat-label">Desktop</div>
                    </div>
                    <div class="stat-item">
                        <div id="platformMobile" class="stat-value">-</div>
                        <div class="stat-label">Mobile</div>
                    </div>
                    <div class="stat-item">
                        <div id="platformWeb" class="stat-value">-</div>
                        <div class="stat-label">Web</div>
                    </div>
                    <div class="stat-item">
                        <div id="listeningTo" class="stat-value">-</div>
                        <div class="stat-label">Listening</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="activity-section fade-in">
            <div id="activityCard" class="activity-card">
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Loading activity...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const LANYARD_API = "https://api.lanyard.rest/v1/users/1381370596335812699";
        
        // DOM elements
        const avatar = document.getElementById('avatar');
        const statusIndicator = document.getElementById('statusIndicator');
        const username = document.getElementById('username');
        const userStatus = document.getElementById('userStatus');
        const customStatus = document.getElementById('customStatus');
        const activityCard = document.getElementById('activityCard');
        const platformDesktop = document.getElementById('platformDesktop');
        const platformMobile = document.getElementById('platformMobile');
        const platformWeb = document.getElementById('platformWeb');
        const listeningTo = document.getElementById('listeningTo');
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        const weatherWidget = document.getElementById('weatherWidget');

        // Status colors
        const statusColors = {
            online: { color: 'var(--success)', label: 'Online' },
            idle: { color: 'var(--warning)', label: 'Idle' },
            dnd: { color: 'var(--danger)', label: 'Do Not Disturb' },
            offline: { color: 'var(--offline)', label: 'Offline' }
        };

        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }


        // Background music setup
        function setupBackgroundMusic() {
            console.log('Setting up background music: Metallica - One');
            
            // Music control button functionality
            musicToggle.addEventListener('click', function() {
                if (bgMusic.paused) {
                    bgMusic.play().then(() => {
                        console.log('Music started playing');
                        musicToggle.classList.add('playing');
                        musicToggle.querySelector('.music-icon').textContent = '⏸️';
                    }).catch(e => {
                        console.log('Audio play failed:', e);
                    });
                } else {
                    bgMusic.pause();
                    musicToggle.classList.remove('playing');
                    musicToggle.querySelector('.music-icon').textContent = '🎵';
                }
            });
            
            // Update button state when music ends
            bgMusic.addEventListener('ended', function() {
                musicToggle.classList.remove('playing');
                musicToggle.querySelector('.music-icon').textContent = '🎵';
            });
            
            // Add keyboard shortcut (spacebar) to play/pause
            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space') {
                    e.preventDefault();
                    musicToggle.click();
                }
            });
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updatePlatformStatus(data) {
            const desktop = data.active_on_discord_desktop ? '🟢' : '⚫';
            const mobile = data.active_on_discord_mobile ? '🟢' : '⚫';
            const web = data.active_on_discord_web ? '🟢' : '⚫';
            const listening = data.listening_to_spotify ? '🎵' : '🔇';

            platformDesktop.textContent = desktop;
            platformMobile.textContent = mobile;
            platformWeb.textContent = web;
            listeningTo.textContent = listening;
        }

        function updateActivity(data) {
            const activities = data.activities || [];
            const spotifyActivity = activities.find(a => a.type === 2 && a.name === 'Spotify');
            const customStatusActivity = activities.find(a => a.type === 4);

            if (spotifyActivity) {
                const trackId = spotifyActivity.sync_id;
                const song = spotifyActivity.details || 'Unknown Track';
                const artist = spotifyActivity.state || 'Unknown Artist';
                const albumArt = spotifyActivity.assets?.large_image?.replace('spotify:', 'https://i.scdn.co/image/') || 'https://via.placeholder.com/80x80/1db954/ffffff?text=🎵';
                const spotifyUrl = `https://open.spotify.com/track/${trackId}`;

                const start = spotifyActivity.timestamps?.start;
                const end = spotifyActivity.timestamps?.end;
                
                let progressHTML = '';
                if (start && end) {
                    const duration = end - start;
                    const elapsed = Date.now() - start;
                    const progressPercent = Math.min((elapsed / duration) * 100, 100);

                    progressHTML = `
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progressPercent}%"></div>
                            </div>
                            <div class="progress-time">
                                <span>${formatTime(elapsed)}</span>
                                <span>${formatTime(duration)}</span>
                            </div>
                        </div>
                    `;
                }

                activityCard.innerHTML = `
                    <div class="activity-header">
                        <div class="activity-icon">🎵</div>
                        <div class="activity-title">Listening to Spotify</div>
                    </div>
                    <div class="spotify-content">
                        <div class="album-art" style="background-image: url('${albumArt}')" onclick="window.open('${spotifyUrl}', '_blank')"></div>
                        <div class="track-info">
                            <div class="track-name">${song}</div>
                            <div class="track-artist">${artist}</div>
                            ${progressHTML}
                            <div class="spotify-link">
                                <a href="${spotifyUrl}" target="_blank" rel="noopener noreferrer">Open in Spotify →</a>
                            </div>
                        </div>
                    </div>
                `;
            } else if (customStatusActivity && customStatusActivity.state) {
                activityCard.innerHTML = `
                    <div class="activity-header">
                        <div class="activity-icon">💬</div>
                        <div class="activity-title">Custom Status</div>
                    </div>
                    <div style="text-align: center; padding: 1rem;">
                        <div style="font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.5rem;">
                            "${customStatusActivity.state}"
                        </div>
                    </div>
                `;
            } else {
                activityCard.innerHTML = `
                    <div class="no-activity">
                        <div style="font-size: 2rem; margin-bottom: 1rem;">🎮</div>
                        <div>No current activity</div>
                        <div style="font-size: 0.9rem; margin-top: 0.5rem;">Check back later!</div>
                    </div>
                `;
            }
        }

        async function fetchUserData() {
            try {
                const response = await fetch(LANYARD_API);
                const data = await response.json();

                if (!data.success) {
                    throw new Error('Failed to fetch user data');
                }

                const userData = data.data;
                const user = userData.discord_user;
                const status = userData.discord_status;

                // Update avatar
                const avatarUrl = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256`;
                avatar.style.backgroundImage = `url(${avatarUrl})`;

                // Update status
                const statusInfo = statusColors[status] || statusColors.offline;
                avatar.className = `avatar ${status}`;
                statusIndicator.className = `status-indicator ${status}`;
                statusIndicator.style.background = statusInfo.color;

                // Update user info
                username.textContent = user.display_name || user.global_name || user.username;
                userStatus.textContent = statusInfo.label;

                // Update custom status
                const customStatusActivity = userData.activities?.find(a => a.type === 4);
                if (customStatusActivity && customStatusActivity.state) {
                    customStatus.textContent = `"${customStatusActivity.state}"`;
                } else {
                    customStatus.textContent = '';
                }

                // Update platform status
                updatePlatformStatus(userData);

                // Update activity
                updateActivity(userData);

            } catch (error) {
                console.error('Error fetching user data:', error);
                username.textContent = 'Error loading profile';
                userStatus.textContent = 'Connection failed';
                activityCard.innerHTML = `
                    <div class="no-activity">
                        <div style="color: var(--danger);">Failed to load activity</div>
                    </div>
                `;
            }
        }

        // Initialize everything
        createParticles();
        setupBackgroundMusic();
        fetchUserData();

        // Store current Spotify activity data globally
        let currentSpotifyActivity = null;
        let progressUpdateInterval = null;

        // Function to update progress bar without visual refresh
        function updateProgressBar() {
            if (!currentSpotifyActivity) return;
            
            const start = currentSpotifyActivity.timestamps?.start;
            const end = currentSpotifyActivity.timestamps?.end;
            
            if (start && end) {
                const duration = end - start;
                const elapsed = Date.now() - start;
                const progressPercent = Math.min((elapsed / duration) * 100, 100);
                
                // Update progress bar smoothly
                const progressFill = document.querySelector('.progress-fill');
                const elapsedTime = document.querySelector('.progress-time span:first-child');
                const totalTime = document.querySelector('.progress-time span:last-child');
                
                if (progressFill) {
                    progressFill.style.width = `${progressPercent}%`;
                }
                
                if (elapsedTime) {
                    elapsedTime.textContent = formatTime(elapsed);
                }
                
                if (totalTime) {
                    totalTime.textContent = formatTime(duration);
                }
            }
        }

        // Modified updateActivity function to store Spotify data
        function updateActivity(data) {
            const activities = data.activities || [];
            const spotifyActivity = activities.find(a => a.type === 2 && a.name === 'Spotify');
            const customStatusActivity = activities.find(a => a.type === 4);

            // Clear existing progress update interval
            if (progressUpdateInterval) {
                clearInterval(progressUpdateInterval);
                progressUpdateInterval = null;
            }

            if (spotifyActivity) {
                // Store current Spotify activity for progress updates
                currentSpotifyActivity = spotifyActivity;
                
                const trackId = spotifyActivity.sync_id;
                const song = spotifyActivity.details || 'Unknown Track';
                const artist = spotifyActivity.state || 'Unknown Artist';
                const albumArt = spotifyActivity.assets?.large_image?.replace('spotify:', 'https://i.scdn.co/image/') || 'https://via.placeholder.com/80x80/1db954/ffffff?text=🎵';
                const spotifyUrl = `https://open.spotify.com/track/${trackId}`;

                const start = spotifyActivity.timestamps?.start;
                const end = spotifyActivity.timestamps?.end;
                
                let progressHTML = '';
                if (start && end) {
                    const duration = end - start;
                    const elapsed = Date.now() - start;
                    const progressPercent = Math.min((elapsed / duration) * 100, 100);

                    progressHTML = `
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progressPercent}%"></div>
                            </div>
                            <div class="progress-time">
                                <span>${formatTime(elapsed)}</span>
                                <span>${formatTime(duration)}</span>
                            </div>
                        </div>
                    `;
                }

                activityCard.innerHTML = `
                    <div class="activity-header">
                        <div class="activity-icon">🎵</div>
                        <div class="activity-title">Listening to Spotify</div>
                    </div>
                    <div class="spotify-content">
                        <div class="album-art" style="background-image: url('${albumArt}')" onclick="window.open('${spotifyUrl}', '_blank')"></div>
                        <div class="track-info">
                            <div class="track-name">${song}</div>
                            <div class="track-artist">${artist}</div>
                            ${progressHTML}
                            <div class="spotify-link">
                                <a href="${spotifyUrl}" target="_blank" rel="noopener noreferrer">Open in Spotify →</a>
                            </div>
                        </div>
                    </div>
                `;
                
                // Start progress update interval
                progressUpdateInterval = setInterval(updateProgressBar, 1000);
            } else {
                // Clear current Spotify activity
                currentSpotifyActivity = null;
                
                if (customStatusActivity && customStatusActivity.state) {
                    activityCard.innerHTML = `
                        <div class="activity-header">
                            <div class="activity-icon">💬</div>
                            <div class="activity-title">Custom Status</div>
                        </div>
                        <div style="text-align: center; padding: 1rem;">
                            <div style="font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.5rem;">
                                "${customStatusActivity.state}"
                            </div>
                        </div>
                    `;
                } else {
                    activityCard.innerHTML = `
                        <div class="no-activity">
                            <div style="font-size: 2rem; margin-bottom: 1rem;">🎮</div>
                            <div>No current activity</div>
                            <div style="font-size: 0.9rem; margin-top: 0.5rem;">Check back later!</div>
                        </div>
                    `;
                }
            }
        }

        // Update every 5 seconds for new data, but progress bar updates every second
        setInterval(fetchUserData, 1000);

        // Add interactive effects
        document.addEventListener('DOMContentLoaded', () => {
            // Add click effects to avatar
            avatar.addEventListener('click', () => {
                avatar.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    avatar.style.transform = 'scale(1.05)';
                }, 150);
            });

            // Add hover effects to stat items
            const statItems = document.querySelectorAll('.stat-item');
            statItems.forEach(item => {
                item.addEventListener('mouseenter', () => {
                    item.style.transform = 'translateY(-2px) scale(1.02)';
                });
                
                item.addEventListener('mouseleave', () => {
                    item.style.transform = 'translateY(0) scale(1)';
                });
            });
        });
    </script>
</body>
</html>
